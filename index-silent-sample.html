<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KoffyKraft | Sample</title>
  <meta name="description" content="KoffyKraft sample page.">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400&family=Cormorant+Garamond:wght@300&display=swap");

    :root {
      --ink: #111;
      --muted: #7b7b76;
      --line: #efefeb;
      --gutter: clamp(24px, 6vw, 96px);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: #fff;
      color: var(--ink);
      font-family: "Barlow Condensed", "Arial Narrow", "Aptos Narrow", "Helvetica Neue", Arial, sans-serif;
    }

    a { color: inherit; }

    .top,
    .foot {
      min-height: 92px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 28px;
      padding: 26px var(--gutter);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand {
      font-size: clamp(30px, 3vw, 46px);
      font-weight: 300;
      letter-spacing: -0.02em;
      text-transform: none;
      text-decoration: none;
    }

    .top a:not(.brand),
    .foot a,
    .room a {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .top a:not(.brand):hover,
    .foot a:hover,
    .room a:hover,
    .index a:hover {
      text-decoration: underline;
      text-underline-offset: 8px;
    }

    .first {
      min-height: calc(100vh - 92px);
      display: grid;
      grid-template-columns: minmax(0, 0.72fr) minmax(260px, 0.42fr);
      align-items: center;
      gap: clamp(64px, 12vw, 190px);
      padding: clamp(70px, 11vw, 162px) var(--gutter);
    }

    .first h1 {
      margin: 0;
      font-family: "Cormorant Garamond", Garamond, "Times New Roman", serif;
      font-size: clamp(84px, 12vw, 178px);
      font-weight: 300;
      letter-spacing: -0.055em;
      line-height: 0.82;
    }

    .first figure,
    .room figure,
    .first img,
    .room img {
      margin: 0;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: saturate(0.62) contrast(0.94) brightness(1.06);
    }

    .first img {
      max-height: 62vh;
      object-fit: contain;
    }

    .first figure {
      grid-column: 2;
    }

    .rooms {
      padding: clamp(46px, 8vw, 120px) var(--gutter) clamp(104px, 15vw, 240px);
    }

    .room {
      max-width: 1220px;
      min-height: 88vh;
      margin: 0 auto clamp(108px, 15vw, 240px);
      display: grid;
      grid-template-columns: minmax(0, 0.62fr) minmax(160px, 0.28fr);
      align-items: center;
      gap: clamp(46px, 9vw, 150px);
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .room:nth-child(even) {
      grid-template-columns: minmax(160px, 0.28fr) minmax(0, 0.62fr);
    }

    .room:last-child { margin-bottom: 0; }

    .room img {
      max-height: 78vh;
      object-fit: contain;
    }

    .room nav {
      display: grid;
      gap: 16px;
      justify-content: start;
      color: #20201d;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .index {
      min-height: 78vh;
      display: grid;
      align-items: center;
      padding: clamp(96px, 14vw, 204px) var(--gutter);
      border-top: 1px solid var(--line);
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .index-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1px;
      max-width: 1160px;
      background: var(--line);
    }

    .index a {
      min-height: 142px;
      display: flex;
      align-items: end;
      padding: 24px;
      background: #fff;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
    }

    .foot {
      min-height: 104px;
      border-top: 1px solid var(--line);
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .top,
      .foot {
        min-height: 86px;
        align-items: flex-start;
        flex-direction: column;
        padding: 24px;
      }

      .first,
      .room,
      .room:nth-child(even),
      .index-grid {
        grid-template-columns: 1fr;
      }

      .first {
        min-height: auto;
        padding: 54px 24px 92px;
      }

      .first figure {
        order: -1;
        width: min(260px, 72vw);
        justify-self: center;
      }

      .first h1 {
        font-size: clamp(82px, 23vw, 120px);
      }

      .rooms,
      .index {
        padding-left: 24px;
        padding-right: 24px;
      }

      .room {
        min-height: auto;
      }

      .room nav {
        min-height: 96px;
        align-content: start;
      }

      .index a {
        min-height: 84px;
      }
    }

    @media print {
      .first,
      .rooms,
      .room,
      .index,
      .foot {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .room {
        min-height: auto;
        margin-bottom: 90px;
      }
    }
  </style>
</head>
<body>
  <header class="top">
    <a class="brand" href="index-silent-sample.html" aria-label="KoffyKraft sample home">KoffyKraft</a>
    <a href="#index">index</a>
  </header>

  <main>
    <section class="first">
      <figure>
        <img src="assets/site/sample-roaster-full.jpg" alt="KoffyKraft roaster">
      </figure>
    </section>

    <section class="rooms" aria-label="Objects">
      <article class="room">
        <figure>
          <img src="assets/site/sample-leaf-fresh.jpg" alt="Coffee leaves in a basket">
        </figure>
        <nav aria-label="Related rooms">
          <a href="buna/">Buna</a>
          <a href="citane/">Citane</a>
        </nav>
      </article>

      <article class="room">
        <figure>
          <img src="assets/site/sample-leaf-drying.jpg" alt="Coffee leaves drying on a mesh tray">
        </figure>
        <nav aria-label="Related rooms">
          <a href="citane/">Citane</a>
        </nav>
      </article>

      <article class="room">
        <figure>
          <img src="assets/site/sample-leaf-processed.jpg" alt="Processed coffee leaves">
        </figure>
        <nav aria-label="Related rooms">
          <a href="citane/">Citane</a>
        </nav>
      </article>

      <article class="room">
        <figure>
          <img src="assets/site/home-beans.jpg" alt="Roasted coffee beans">
        </figure>
        <nav aria-label="Related rooms">
          <a href="learn/">Coffee</a>
        </nav>
      </article>

      <article class="room">
        <figure>
          <img src="assets/site/sample-fire.jpg" alt="Fire">
        </figure>
        <nav aria-label="Related rooms">
          <a href="learn/">Coffee</a>
        </nav>
      </article>

      <article class="room">
        <figure>
          <img src="assets/site/sample-citane-cup.jpg" alt="Citane brew">
        </figure>
        <nav aria-label="Related rooms">
          <a href="training/brewing/">Brewing</a>
          <a href="training/cupping/">Cupping</a>
        </nav>
      </article>
    </section>

    <section id="index" class="index">
      <div class="index-grid">
        <a href="learn/">Coffee</a>
        <a href="training/brewing/">Brewing</a>
        <a href="training/cupping/">Cupping</a>
        <a href="buna/">Buna</a>
        <a href="citane/">Citane</a>
      </div>
    </section>
  </main>

  <footer class="foot">
    <span>Karavaloor</span>
    <a href="#note">note</a>
  </footer>
</body>
</html>
