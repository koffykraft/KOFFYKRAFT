<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KoffyKraft | Sample</title>
  <meta name="description" content="KoffyKraft sample page.">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap");

    :root {
      --ink: #121212;
      --muted: #70706b;
      --line: #ecece8;
      --white: #fff;
      --gutter: clamp(24px, 6vw, 96px);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--white);
      color: var(--ink);
      font-family: "Barlow Condensed", "Arial Narrow", "Aptos Narrow", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; }

    .header,
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 28px;
      padding: 28px var(--gutter);
      color: #1f1f1d;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brand {
      font-size: clamp(28px, 3vw, 44px);
      font-weight: 300;
      letter-spacing: -0.018em;
      text-transform: none;
      text-decoration: none;
    }

    .header a:not(.brand),
    .footer a,
    .room-link {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .header a:not(.brand):hover,
    .footer a:hover,
    .room-link:hover {
      text-decoration: underline;
      text-underline-offset: 8px;
    }

    .sight {
      min-height: calc(100vh - 98px);
      display: grid;
      grid-template-columns: minmax(0, 0.72fr) minmax(240px, 0.48fr);
      align-items: center;
      gap: clamp(54px, 10vw, 170px);
      padding: clamp(72px, 11vw, 164px) var(--gutter);
    }

    .place {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1,
    h2 {
      margin: 0;
      font-family: "Cormorant Garamond", Garamond, "Times New Roman", serif;
      font-weight: 300;
      letter-spacing: -0.045em;
    }

    h1 {
      max-width: 760px;
      font-size: clamp(76px, 11vw, 168px);
      line-height: 0.82;
    }

    .sight-photo {
      margin: 0;
      justify-self: center;
      width: min(360px, 100%);
    }

    .sight-photo img {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      filter: saturate(0.58) contrast(0.92) brightness(1.08);
    }

    .rooms {
      padding: clamp(54px, 9vw, 138px) var(--gutter) clamp(96px, 15vw, 240px);
    }

    .room {
      min-height: 88vh;
      max-width: 1240px;
      margin: 0 auto clamp(110px, 15vw, 240px);
      display: grid;
      grid-template-columns: minmax(0, 0.64fr) minmax(0, 0.52fr);
      align-items: center;
      gap: clamp(56px, 10vw, 170px);
    }

    .room:nth-child(even) {
      grid-template-columns: minmax(0, 0.52fr) minmax(0, 0.64fr);
    }

    .room:last-child { margin-bottom: 0; }

    .room figure {
      margin: 0;
    }

    .room img {
      display: block;
      width: 100%;
      max-height: 76vh;
      object-fit: cover;
      filter: saturate(0.58) contrast(0.93) brightness(1.08);
    }

    .room.narrow img {
      aspect-ratio: 4 / 5;
    }

    figcaption {
      display: grid;
      gap: 18px;
      align-content: center;
    }

    figcaption h2 {
      font-size: clamp(66px, 9vw, 128px);
      line-height: 0.84;
    }

    .room-link {
      width: max-content;
      color: #20201d;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .index {
      min-height: 92vh;
      display: grid;
      align-items: end;
      padding: clamp(96px, 14vw, 204px) var(--gutter);
      border-top: 1px solid var(--line);
    }

    .index h2 {
      margin-bottom: 58px;
      font-size: clamp(76px, 11vw, 150px);
      line-height: 0.84;
    }

    .index-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1px;
      max-width: 1180px;
      background: var(--line);
    }

    .index-grid a {
      min-height: 148px;
      display: flex;
      align-items: end;
      padding: 24px;
      background: #fff;
      color: #22221f;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
    }

    .index-grid a:hover {
      text-decoration: underline;
      text-underline-offset: 8px;
    }

    .footer {
      border-top: 1px solid var(--line);
      color: #777771;
    }

    .footer a {
      color: #777771;
    }

    @media (max-width: 760px) {
      .header,
      .footer {
        align-items: flex-start;
        flex-direction: column;
        padding: 24px;
      }

      .sight,
      .room,
      .room:nth-child(even),
      .index-grid {
        grid-template-columns: 1fr;
      }

      .sight {
        min-height: auto;
        padding: 54px 24px 84px;
      }

      h1 {
        font-size: clamp(76px, 22vw, 112px);
      }

      .sight-photo {
        order: -1;
        width: min(240px, 68vw);
      }

      .rooms,
      .index {
        padding-left: 24px;
        padding-right: 24px;
      }

      .room {
        min-height: auto;
      }

      .room img {
        max-height: none;
      }

      figcaption h2 {
        font-size: clamp(58px, 18vw, 92px);
      }

      .index-grid a {
        min-height: 86px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <a class="brand" href="index-silent-sample.html" aria-label="KoffyKraft sample home">KoffyKraft</a>
    <a href="#index">index</a>
  </header>

  <main>
    <section class="sight" aria-labelledby="sample-title">
      <div>
        <p class="place">Karavaloor</p>
        <h1 id="sample-title">Coffee.</h1>
      </div>
      <figure class="sight-photo">
        <img src="assets/site/home-roaster-detail.jpg" alt="KoffyKraft coffee roaster">
      </figure>
    </section>

    <section class="rooms" aria-label="Objects">
      <article class="room narrow">
        <figure>
          <img src="assets/site/citane-dried-leaves.jpg" alt="Processed coffee leaves">
        </figure>
        <figcaption>
          <h2>Leaves.</h2>
          <a class="room-link" href="citane/">Citane</a>
        </figcaption>
      </article>

      <article class="room">
        <figcaption>
          <h2>Roaster.</h2>
          <a class="room-link" href="learn/">Coffee</a>
        </figcaption>
        <figure>
          <img src="assets/site/home-roaster-detail.jpg" alt="Roaster detail">
        </figure>
      </article>

      <article class="room narrow">
        <figure>
          <img src="assets/site/citane-amber-cup.jpg" alt="Citane brew">
        </figure>
        <figcaption>
          <h2>Cup.</h2>
          <a class="room-link" href="training/brewing/">Brewing</a>
          <a class="room-link" href="training/cupping/">Cupping</a>
        </figcaption>
      </article>
    </section>

    <section id="index" class="index" aria-label="Index">
      <div>
        <p class="place">Index</p>
        <h2>KoffyKraft.</h2>
        <div class="index-grid">
          <a href="learn/">Coffee</a>
          <a href="training/brewing/">Brewing</a>
          <a href="training/cupping/">Cupping</a>
          <a href="buna/">Buna</a>
          <a href="citane/">Citane</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>KoffyKraft</span>
    <span>Karavaloor</span>
    <a href="#note">note</a>
  </footer>
</body>
</html>
